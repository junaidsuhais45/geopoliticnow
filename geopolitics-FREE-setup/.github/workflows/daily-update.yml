name: Daily Content Generation
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-content.js
      - name: Push to GitHub
        run: |
          git config user.email "bot@geopoliticsnow.com"
          git config user.name "Geopolitics Bot"
          git add dist/
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push
